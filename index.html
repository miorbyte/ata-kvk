<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezi-ATP | Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(71, 85, 105, 0.3); }
        input, select { background-color: #1e293b !important; color: #f1f5f9 !important; border: 1px solid #334155 !important; }
        
        @media print {
            body { background-color: white; color: black; }
            .no-print, button { display: none !important; }
            .glass-card { border: 1px solid #ccc; background: none; box-shadow: none; }
            input, select { border: none !important; background: none !important; color: black !important; -webkit-appearance: none; }
            .sticky { position: static !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-start mb-8 no-print">
            <div>
                <h1 class="text-2xl font-semibold text-blue-400">Ezi-ATP</h1>
                <p class="text-slate-400 text-sm">Sistem Pengiraan Amanah Tugas Automatik</p>
            </div>
            <div class="space-x-2">
                <button onclick="saveToWeb()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition">Simpan Data</button>
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm transition">Cetak PDF</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-6 shadow-sm">
            <h2 class="text-lg font-semibold mb-4 text-blue-400 border-b border-slate-700 pb-2">Maklumat Pensyarah</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase">Nama Penuh</label>
                    <input type="text" id="nama" class="w-full p-2 rounded-lg text-sm" placeholder="Contoh: NOOR AZIRA BT HAMZAH [cite: 5, 12]">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase">Jabatan</label>
                    <input type="text" id="jabatan" class="w-full p-2 rounded-lg text-sm" placeholder="Contoh: PERNIAGAAN [cite: 5, 13]">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase">Semester/Tahun</label>
                    <input type="text" id="semester" class="w-full p-2 rounded-lg text-sm" placeholder="Contoh: JAN-DISEMBER 2025 [cite: 8]">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase">Unit</label>
                    <input type="text" id="unit" class="w-full p-2 rounded-lg text-sm" placeholder="Contoh: PENGURUSAN PERNIAGAAN [cite: 8]">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-6 shadow-sm">
            <h2 class="text-lg font-semibold mb-4 text-emerald-400 border-b border-slate-700 pb-2">Amanah Tugas Syarahan (Hakiki)</h2>
            <div id="akademik-list" class="space-y-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-4 items-end border-b border-slate-800">
                    <div class="col-span-2 md:col-span-1">
                        <label class="text-[10px] text-slate-500 uppercase">Kod/Nama Kursus</label>
                        <input type="text" class="kursus-nama w-full p-2 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase">Jam Teori </label>
                        <input type="number" class="jam-teori w-full p-2 rounded-lg text-sm" oninput="hitungSemua()">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase">Jam Amali </label>
                        <input type="number" class="jam-amali w-full p-2 rounded-lg text-sm" oninput="hitungSemua()">
                    </div>
                </div>
            </div>
            <button onclick="tambahBarisAkademik()" class="mt-4 text-sm text-emerald-400 hover:text-emerald-300 no-print">+ Tambah Kursus</button>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-6 shadow-sm">
            <h2 class="text-lg font-semibold mb-4 text-amber-400 border-b border-slate-700 pb-2">Tugas-Tugas Lain [cite: 1, 9]</h2>
            <div id="sampingan-list" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-4 border-b border-slate-800">
                    <input type="text" placeholder="Unit/Jawatankuasa" class="tugas-nama p-2 rounded-lg text-sm">
                    <select class="jawatan-select p-2 rounded-lg text-sm" onchange="hitungSemua()">
                        <option value="0">Pilih Jawatan [cite: 3]</option>
                        <option value="9">Ketua Jabatan (9 ATP)</option>
                        <option value="7">Ketua Unit Vok/Warden (7 ATP)</option>
                        <option value="5">Ketua Unit/Peg. Aset (5 ATP)</option>
                        <option value="4">Penyelaras/Mentor (4 ATP)</option>
                        <option value="3">Setiausaha/Pen. Warden (3 ATP)</option>
                        <option value="2">Bendahari/Pen. S/U (2 ATP)</option>
                        <option value="1">Ahli Jawatankuasa/AJK (1 ATP)</option>
                    </select>
                </div>
            </div>
            <button onclick="tambahBarisSampingan()" class="mt-4 text-sm text-amber-400 hover:text-amber-300 no-print">+ Tambah Tugas</button>
        </div>

        <div class="sticky bottom-6 glass-card rounded-2xl p-6 shadow-2xl border-t-4 border-blue-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-bold">Jumlah ATP Keseluruhan [cite: 10]</p>
                    <h3 id="total-atp" class="text-4xl font-bold text-white">0.0</h3>
                </div>
                <div class="text-right">
                    <p class="text-sm text-slate-400 italic">Had Maksimum: 50.0 [cite: 10]</p>
                    <p id="status-msg" class="text-xs font-semibold mt-1"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Memuatkan data yang disimpan semasa page refresh
        window.onload = function() {
            if(localStorage.getItem('atpData')) {
                const data = JSON.parse(localStorage.getItem('atpData'));
                document.getElementById('nama').value = data.nama || '';
                document.getElementById('jabatan').value = data.jabatan || '';
                document.getElementById('semester').value = data.semester || '';
                document.getElementById('unit').value = data.unit || '';
                // Anda boleh menambah logik untuk load baris dinamik jika perlu
                hitungSemua();
            }
        };

        function saveToWeb() {
            const data = {
                nama: document.getElementById('nama').value,
                jabatan: document.getElementById('jabatan').value,
                semester: document.getElementById('semester').value,
                unit: document.getElementById('unit').value
            };
            localStorage.setItem('atpData', JSON.stringify(data));
            alert("Maklumat staf telah disimpan dalam pelayar!");
        }

        function tambahBarisAkademik() {
            const html = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-4 items-end border-b border-slate-800">
                <div class="col-span-2 md:col-span-1"><input type="text" class="kursus-nama w-full p-2 rounded-lg text-sm"></div>
                <div><input type="number" class="jam-teori w-full p-2 rounded-lg text-sm" oninput="hitungSemua()"></div>
                <div><input type="number" class="jam-amali w-full p-2 rounded-lg text-sm" oninput="hitungSemua()"></div>
            </div>`;
            document.getElementById('akademik-list').insertAdjacentHTML('beforeend', html);
        }

        function tambahBarisSampingan() {
            const html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-4 border-b border-slate-800">
                <input type="text" placeholder="Unit/Jawatankuasa" class="tugas-nama p-2 rounded-lg text-sm">
                <select class="jawatan-select p-2 rounded-lg text-sm" onchange="hitungSemua()">
                    <option value="0">Pilih Jawatan</option>
                    <option value="9">Ketua Jabatan (9)</option>
                    <option value="7">Ketua Unit Vok/Warden (7)</option>
                    <option value="5">Ketua Unit/Peg. Aset (5)</option>
                    <option value="4">Penyelaras/Mentor (4)</option>
                    <option value="3">Setiausaha/Pen. Warden (3)</option>
                    <option value="2">Bendahari/Pen. S/U (2)</option>
                    <option value="1">Ahli Jawatankuasa/AJK (1)</option>
                </select>
            </div>`;
            document.getElementById('sampingan-list').insertAdjacentHTML('beforeend', html);
        }

        function hitungSemua() {
            let totalAkademik = 0;
            let totalSampingan = 0;

            // Logik: (Teori + Amali) * 1.5 
            const teoriInputs = document.querySelectorAll('.jam-teori');
            const amaliInputs = document.querySelectorAll('.jam-amali');
            for (let i = 0; i < teoriInputs.length; i++) {
                let t = parseFloat(teoriInputs[i].value) || 0;
                let a = parseFloat(amaliInputs[i].value) || 0;
                totalAkademik += (t + a) * 1.5;
            }

            // Logik: Nilai tetap jawatan [cite: 3, 9]
            document.querySelectorAll('.jawatan-select').forEach(select => {
                totalSampingan += parseFloat(select.value) || 0;
            });

            const jumlahBesar = totalAkademik + totalSampingan;
            document.getElementById('total-atp').innerText = jumlahBesar.toFixed(1);

            const msg = document.getElementById('status-msg');
            if (jumlahBesar > 50) {
                msg.innerText = "MELEBIHI HAD MAKSIMUM [cite: 10]";
                msg.className = "text-xs font-semibold text-red-400 mt-1";
            } else {
                msg.innerText = "BEBAN TUGAS OPTIMUM";
                msg.className = "text-xs font-semibold text-emerald-400 mt-1";
            }
        }
    </script>
</body>
</html>
